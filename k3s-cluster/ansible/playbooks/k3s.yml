- name: Prepare all nodes
  hosts: all
  become: true
  roles:
    - node_prep

- name: Deploy kube-vip manifests on first server
  hosts: k3s_servers
  become: true
  run_once: true
  roles:
    - kube_vip

- name: Install K3s server
  hosts: k3s_servers
  become: true
  roles:
    - k3s_server

- name: Wait for kube-vip VIP to be ready
  hosts: k3s_servers
  become: true
  run_once: true
  tasks:
    - name: Wait for kube-vip to accept connections on VIP
      wait_for:
        host: "192.168.1.32"
        port: 6443
        delay: 10
        timeout: 300
