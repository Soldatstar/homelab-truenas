- name: Add cert-manager repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io

- name: Check if cert-manager release exists
  kubernetes.core.helm_info:
    name: cert-manager
    release_namespace: cert-manager
  register: cert_manager_info
  ignore_errors: yes

- name: Install cert-manager
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    release_namespace: cert-manager
    create_namespace: true
    state: present
    values:
      installCRDs: true
  when: cert_manager_info.failed or cert_manager_info.status is not defined

- name: Deploy selfsigned root issuer
  kubernetes.core.k8s:
    definition: "{{ lookup('file', role_path + '/files/selfsigned-issuer.yml') }}"

- name: Create internal CA certificate
  kubernetes.core.k8s:
    definition: "{{ lookup('file', role_path + '/files/root-ca.yml') }}"

- name: Create internal CA issuer
  kubernetes.core.k8s:
    definition: "{{ lookup('file', role_path + '/files/internal-ca-issuer.yml') }}"
    